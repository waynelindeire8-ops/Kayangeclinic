{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-gear"></i> Staff Setting</h4>
    <a href="/staff/new" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Staff</a>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table" id="staff-table">
                <thead>
                    <tr>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Staff</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Username</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Role</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Email</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Phone</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Status</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const avatarColors = ['#16a34a','#2563eb','#f59e0b','#dc2626','#9333ea','#0ea5e9','#ec4899'];
    let ci = 0;

    $('#staff-table').DataTable({
        ajax: { url: '/staff/api', dataSrc: '' },
        columns: [
            { data: null, render: function(d) {
                const initials = (d.first_name || 'S').charAt(0) + (d.last_name || '').charAt(0);
                const color = avatarColors[ci++ % avatarColors.length];
                return '<div class="patient-cell"><div class="patient-avatar" style="background:' + color + '">' + initials + '</div><div class="fw-semibold" style="color:#0f172a">' + d.first_name + ' ' + d.last_name + '</div></div>';
            }},
            { data: 'username' },
            { data: 'role', render: d => '<span class="badge bg-success">' + d.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()) + '</span>' },
            { data: 'email', render: d => d || '-' },
            { data: 'phone', render: d => d || '-' },
            { data: null, render: d => d.is_active ? '<span class="badge bg-success">Active</span>' : '<span class="badge bg-secondary">Inactive</span>' },
            { data: null, render: d => '<a href="/staff/' + d.id + '/edit" class="btn-action edit" title="Edit"><i class="bi bi-pencil"></i></a>' }
        ],
        order: [[2, 'asc']],
        pageLength: 20
    });
});
</script>
{% endblock %}
