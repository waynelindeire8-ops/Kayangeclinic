{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-gear"></i> Staff Settings</h4>
    <a href="/staff/new" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Staff</a>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table" id="staff-table">
                <thead>
                    <tr>
                        <th>Staff</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const avatarColors = ['#16a34a','#2563eb','#f59e0b','#dc2626','#9333ea','#0ea5e9','#ec4899'];
    let ci = 0;

    $('#staff-table').DataTable({
        ajax: { url: '/staff/api', dataSrc: '' },
        columns: [
            { data: null, render: function(d) {
                const initials = (d.first_name || 'S').charAt(0) + (d.last_name || '').charAt(0);
                const color = avatarColors[ci++ % avatarColors.length];
                return '<div class="patient-cell"><div class="patient-avatar" style="background:' + color + '">' + initials + '</div><div class="fw-semibold" style="color:#0f172a">' + d.first_name + ' ' + d.last_name + '</div></div>';
            }},
            { data: 'username' },
            { data: 'role', render: d => '<span class="badge bg-success">' + d.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase()) + '</span>' },
            { data: 'email', render: d => d || '-' },
            { data: 'phone', render: d => d || '-' },
            { data: null, render: d => d.is_active ? '<span class="badge bg-success">Active</span>' : '<span class="badge bg-secondary">Inactive</span>' },
            { data: null, render: d => '<div class="d-flex gap-1"><a href="/staff/' + d.id + '/edit" class="btn-action edit" title="Edit"><i class="bi bi-pencil"></i></a>' + (d.username !== 'admin' ? '<button class="btn-action delete" onclick="deleteStaff(' + d.id + ')" title="Delete"><i class="bi bi-trash"></i></button>' : '') + '</div>' }
        ],
        order: [[2, 'asc']],
        pageLength: 20
    });
});

async function deleteStaff(id) {
    if (!confirm('Delete this staff member? This cannot be undone.')) return;
    const res = await fetchWithAuth('/staff/api/' + id, { method: 'DELETE' });
    if (res.ok) {
        $('#staff-table').DataTable().ajax.reload();
    } else {
        const err = await res.json();
        alert(err.error || 'Error deleting staff');
    }
}
</script>
{% endblock %}
