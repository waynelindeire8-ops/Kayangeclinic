{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-receipt"></i> New Lab Invoice</h4>
    <a href="/lab/invoices" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>

<div class="row g-3">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header"><h6>Invoice Details</h6></div>
            <div class="card-body">
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Patient <span class="text-danger">*</span></label>
                        <select class="form-select" id="patient_id" required><option value="">Select patient...</option></select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Payment Method</label>
                        <select class="form-select" id="payment_method">
                            <option value="cash">Cash</option><option value="card">Card</option>
                            <option value="mobile_money">Mobile Money</option><option value="insurance">Insurance</option></select>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Notes</label>
                    <input type="text" class="form-control" id="notes" placeholder="Optional notes">
                </div>
            </div>
        </div>

        <div class="card mt-3">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h6>Invoice Items</h6>
                <button class="btn btn-sm btn-outline-primary" onclick="addItem()"><i class="bi bi-plus-lg me-1"></i>Add Item</button>
            </div>
            <div class="card-body">
                <div id="items-container"></div>
                <div id="items-empty" class="text-center text-muted py-3" style="display:none">
                    <i class="bi bi-plus-circle" style="font-size:1.5rem;display:block;margin-bottom:0.25rem"></i>
                    Click "Add Item" to add line items
                </div>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card">
            <div class="card-header"><h6>Summary</h6></div>
            <div class="card-body">
                <div class="d-flex justify-content-between mb-2"><span class="text-muted">Subtotal:</span><strong id="subtotal">MWK 0</strong></div>
                <hr>
                <div class="d-flex justify-content-between mb-3"><span class="text-muted fw-bold">Total:</span><strong id="total" class="text-primary" style="font-size:1.25rem">MWK 0</strong></div>
                <div class="mb-3">
                    <label class="form-label">Amount Paid</label>
                    <input type="number" class="form-control" id="amount_paid" min="0" value="0" onchange="updateSummary()">
                </div>
                <div class="d-flex justify-content-between mb-3"><span class="text-muted">Balance:</span><strong id="balance">MWK 0</strong></div>
                <button class="btn btn-primary w-100" onclick="saveInvoice()"><i class="bi bi-check-lg me-1"></i>Create Invoice</button>
            </div>
        </div>

        <div class="card mt-3">
            <div class="card-header"><h6>Quick Add from Lab Orders</h6></div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Patient</label>
                    <select class="form-select" id="quick-patient" onchange="loadPatientOrders()"><option value="">Select patient...</option></select>
                </div>
                <div id="quick-orders"><p class="text-muted" style="font-size:0.85rem">Select patient to see completed lab orders</p></div>
            </div>
        </div>
    </div>
</div>

<script>
let items = [];
let orderPrices = {};

document.addEventListener('DOMContentLoaded', async function() {
    const pRes = await fetchWithAuth('/patients/api');
    const patients = await pRes.json();
    const pSel = document.getElementById('patient_id');
    const qSel = document.getElementById('quick-patient');
    patients.forEach(p => {
        const o = document.createElement('option'); o.value = p.id;
        o.textContent = p.patient_id + ' - ' + p.first_name + ' ' + p.last_name;
        pSel.appendChild(o.cloneNode(true));
        qSel.appendChild(o);
    });
    addItem();
});

function addItem(name, qty, price, testId) {
    const id = items.length;
    items.push({ name: name || '', quantity: qty || 1, price: price || 0, test_id: testId || null });
    renderItems();
}

function removeItem(i) {
    items.splice(i, 1);
    renderItems();
}

function renderItems() {
    const container = document.getElementById('items-container');
    const empty = document.getElementById('items-empty');
    container.innerHTML = '';
    if (!items.length) { empty.style.display = ''; return; }
    empty.style.display = 'none';
    items.forEach((item, i) => {
        container.innerHTML += '<div class="row g-2 mb-2 align-items-end item-row">' +
            '<div class="col-md-5"><label class="form-label" style="font-size:0.75rem">Item Name</label>' +
            '<input type="text" class="form-control form-control-sm" value="' + esc(item.name) + '" onchange="items[' + i + '].name=this.value;updateSummary()"></div>' +
            '<div class="col-md-2"><label class="form-label" style="font-size:0.75rem">Qty</label>' +
            '<input type="number" class="form-control form-control-sm" value="' + item.quantity + '" min="1" onchange="items[' + i + '].quantity=parseInt(this.value);updateSummary()"></div>' +
            '<div class="col-md-3"><label class="form-label" style="font-size:0.75rem">Unit Price (MWK)</label>' +
            '<input type="number" class="form-control form-control-sm" value="' + item.price + '" min="0" onchange="items[' + i + '].price=parseFloat(this.value);updateSummary()"></div>' +
            '<div class="col-md-2"><button class="btn btn-sm btn-outline-danger" onclick="removeItem(' + i + ')"><i class="bi bi-trash"></i></button></div></div>';
    });
    updateSummary();
}

function updateSummary() {
    let subtotal = 0;
    items.forEach(i => subtotal += i.quantity * i.price);
    const paid = parseFloat(document.getElementById('amount_paid').value) || 0;
    const balance = subtotal - paid;
    document.getElementById('subtotal').textContent = 'MWK ' + subtotal.toLocaleString();
    document.getElementById('total').textContent = 'MWK ' + subtotal.toLocaleString();
    document.getElementById('balance').textContent = 'MWK ' + balance.toLocaleString();
    document.getElementById('balance').className = balance > 0 ? 'text-danger' : 'text-success';
}

async function loadPatientOrders() {
    const patientId = document.getElementById('quick-patient').value;
    const container = document.getElementById('quick-orders');
    if (!patientId) { container.innerHTML = '<p class="text-muted" style="font-size:0.85rem">Select patient to see completed lab orders</p>'; return; }
    const res = await fetchWithAuth('/lab/api/orders?patient_id=' + patientId);
    const orders = await res.json();
    const completed = orders.filter(o => o.status === 'completed');
    if (!completed.length) { container.innerHTML = '<p class="text-muted" style="font-size:0.85rem">No completed orders</p>'; return; }
    container.innerHTML = '';
    completed.forEach(o => {
        const price = 0;
        container.innerHTML += '<div class="d-flex justify-content-between align-items-center border-bottom py-2" style="font-size:0.85rem">' +
            '<div><div class="fw-semibold">' + esc(o.test_name) + '</div><small class="text-muted">#' + o.id + ' | ' + (o.ordered_date || '') + '</small></div>' +
            '<button class="btn btn-sm btn-outline-primary" onclick="addOrderItem(' + o.id + ', \'' + esc(o.test_name) + '\')">Add</button></div>';
    });
}

async function addOrderItem(orderId, testName) {
    const catRes = await fetchWithAuth('/lab/api/catalog');
    const catalog = await catRes.json();
    const match = catalog.find(c => c.test_name === testName);
    const price = match ? match.default_price : 0;
    addItem(testName, 1, price, orderId);
}

async function saveInvoice() {
    const patientId = document.getElementById('patient_id').value;
    if (!patientId) { showToast('Select a patient', 'danger'); return; }
    if (!items.length || !items[0].name) { showToast('Add at least one item', 'danger'); return; }

    const body = {
        patient_id: parseInt(patientId),
        payment_method: document.getElementById('payment_method').value,
        amount_paid: parseFloat(document.getElementById('amount_paid').value) || 0,
        notes: document.getElementById('notes').value.trim(),
        items: items.filter(i => i.name).map(i => ({
            lab_test_id: i.test_id,
            item_name: i.name,
            quantity: i.quantity,
            unit_price: i.price,
            total_price: i.quantity * i.price
        }))
    };

    const res = await fetchWithAuth('/lab/invoices/api', { method: 'POST', body: JSON.stringify(body) });
    if (res.ok) {
        const data = await res.json();
        showToast('Invoice ' + data.invoice_number + ' created', 'success');
        window.location.href = '/lab/invoices/' + data.id;
    } else {
        const err = await res.json();
        showToast(err.error || 'Failed', 'danger');
    }
}

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>

<style>.item-row { padding: 0.5rem 0; border-bottom: 1px solid #f1f5f9; }</style>
{% endblock %}
