{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-flask"></i> Lab Dashboard</h4>
    <div class="d-flex gap-2">
        <a href="/lab/orders/new" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>New Order</a>
    </div>
</div>

<div class="row g-3 mb-4">
    <div class="col-sm-6 col-xl-3">
        <div class="stat-card">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <div class="stat-icon yellow"><i class="bi bi-clock-history"></i></div>
            </div>
            <div class="stat-value" id="stat-pending">0</div>
            <div class="stat-label">Pending / Collected</div>
        </div>
    </div>
    <div class="col-sm-6 col-xl-3">
        <div class="stat-card">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <div class="stat-icon blue"><i class="bi bi-gear"></i></div>
            </div>
            <div class="stat-value" id="stat-inprog">0</div>
            <div class="stat-label">In Progress</div>
        </div>
    </div>
    <div class="col-sm-6 col-xl-3">
        <div class="stat-card">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <div class="stat-icon green"><i class="bi bi-check-circle"></i></div>
            </div>
            <div class="stat-value" id="stat-completed">0</div>
            <div class="stat-label">Completed Today</div>
        </div>
    </div>
    <div class="col-sm-6 col-xl-3">
        <div class="stat-card">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <div class="stat-icon purple"><i class="bi bi-plus-circle"></i></div>
            </div>
            <div class="stat-value" id="stat-ordered">0</div>
            <div class="stat-label">Ordered Today</div>
        </div>
    </div>
</div>

<div class="row g-3">
    <div class="col-xl-7">
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h6>Recent Orders</h6>
                <a href="/lab/orders" class="btn btn-sm btn-outline-primary">View All</a>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table" id="recent-table">
                        <thead>
                            <tr>
                                <th>Order #</th>
                                <th>Patient</th>
                                <th>Test</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
                <div id="recent-empty" class="text-center text-muted py-4" style="display:none">
                    <i class="bi bi-journal-text" style="font-size:1.5rem;display:block;margin-bottom:0.25rem"></i>
                    No recent orders
                </div>
            </div>
        </div>
    </div>
    <div class="col-xl-5">
        <div class="card">
            <div class="card-header"><h6>Results Entered Today</h6></div>
            <div class="card-body p-0">
                <div id="results-today-list"></div>
                <div id="results-empty" class="text-center text-muted py-4" style="display:none">
                    <i class="bi bi-check2-all" style="font-size:1.5rem;display:block;margin-bottom:0.25rem"></i>
                    No results entered today
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async function() {
    const res = await fetchWithAuth('/lab/api/dashboard');
    const data = await res.json();

    document.getElementById('stat-pending').textContent = data.pending || 0;
    document.getElementById('stat-inprog').textContent = data.in_progress || 0;
    document.getElementById('stat-completed').textContent = data.completed_today || 0;
    document.getElementById('stat-ordered').textContent = data.ordered_today || 0;

    const tbody = document.querySelector('#recent-table tbody');
    const recent = data.recent || [];
    if (recent.length) {
        document.getElementById('recent-empty').style.display = 'none';
        recent.forEach(o => {
            const colors = { ordered: 'secondary', collected: 'info', in_progress: 'primary', completed: 'success' };
            tbody.innerHTML += '<tr>' +
                '<td><span class="fw-semibold">#' + o.id + '</span></td>' +
                '<td><a href="/patients/' + o.patient_id + '" class="text-decoration-none fw-semibold" style="color:#0f172a">' + (o.p_first || '') + ' ' + (o.p_last || '') + '</a></td>' +
                '<td>' + (o.test_name || '') + '</td>' +
                '<td><span class="badge bg-' + (colors[o.status] || 'secondary') + '">' + (o.status || '').replace('_', ' ') + '</span></td>' +
                '<td>' + (o.ordered_date || o.created_at ? new Date(o.ordered_date || o.created_at).toLocaleDateString() : '') + '</td>' +
                '<td><a href="/lab/orders/' + o.id + '" class="btn-action view"><i class="bi bi-eye"></i></a></td></tr>';
        });
    } else {
        document.getElementById('recent-table').style.display = 'none';
        document.getElementById('recent-empty').style.display = 'block';
    }

    const resultsList = document.getElementById('results-today-list');
    const results = data.results_today || [];
    if (results.length) {
        document.getElementById('results-empty').style.display = 'none';
        results.forEach(r => {
            const flagColors = { normal: 'success', high: 'danger', low: 'warning', critical_high: 'danger', critical_low: 'danger', pending: 'secondary' };
            resultsList.innerHTML += '<div class="p-3 border-bottom"><div class="d-flex justify-content-between"><strong>' + escHtml(r.parameter_name) + '</strong><span class="badge bg-' + (flagColors[r.flag] || 'secondary') + '">' + (r.flag || '') + '</span></div><small class="text-muted">' + escHtml(r.test_name || '') + ' - ' + escHtml(r.p_first || '') + ' ' + escHtml(r.p_last || '') + ' | ' + (r.value || '-') + ' ' + (r.unit || '') + '</small></div>';
        });
    } else {
        resultsList.style.display = 'none';
        document.getElementById('results-empty').style.display = 'block';
    }
});

function escHtml(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}
</script>
{% endblock %}
