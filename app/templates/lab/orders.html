{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-list-check"></i> Lab Orders</h4>
    <div class="d-flex gap-2">
        <span class="badge bg-secondary fs-6" id="total-count">0</span>
        <a href="/lab/orders/new" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>New Order</a>
    </div>
</div>

<div class="card mb-3">
    <div class="card-body">
        <div class="row g-2 align-items-end">
            <div class="col-md-2">
                <label class="form-label">Status</label>
                <select class="form-select" id="filter-status">
                    <option value="">All</option>
                    <option value="ordered">Ordered</option>
                    <option value="collected">Collected</option>
                    <option value="in_progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Category</label>
                <select class="form-select" id="filter-category">
                    <option value="">All</option>
                    <option value="haematology">Haematology</option>
                    <option value="parasitology">Parasitology</option>
                    <option value="microbiology">Microbiology</option>
                    <option value="chemistry">Chemistry</option>
                    <option value="lipogram">Lipogram</option>
                    <option value="u_and_e">U&E</option>
                    <option value="cardiac">Cardiac</option>
                    <option value="serology">Serology</option>
                    <option value="tumour_markers">Tumour Markers</option>
                    <option value="endocrinology">Endocrinology</option>
                    <option value="fertility">Fertility</option>
                    <option value="radiology">Radiology</option>
                    <option value="general">General</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Priority</label>
                <select class="form-select" id="filter-priority">
                    <option value="">All</option>
                    <option value="stat">STAT</option>
                    <option value="urgent">Urgent</option>
                    <option value="normal">Normal</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label">Search</label>
                <input type="text" class="form-control" id="filter-search" placeholder="Patient or test...">
            </div>
            <div class="col-md-1">
                <label class="form-label">From</label>
                <input type="date" class="form-control" id="filter-from">
            </div>
            <div class="col-md-1">
                <label class="form-label">To</label>
                <input type="date" class="form-control" id="filter-to">
            </div>
            <div class="col-md-2">
                <div class="d-flex gap-1">
                    <button class="btn btn-primary flex-fill" onclick="loadOrders()"><i class="bi bi-search me-1"></i>Filter</button>
                    <button class="btn btn-outline-secondary" onclick="resetFilters()"><i class="bi bi-x-lg"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="bulk-actions" class="card mb-3" style="display:none">
    <div class="card-body py-2">
        <div class="d-flex align-items-center gap-3">
            <span><strong id="selected-count">0</strong> selected</span>
            <div class="btn-group btn-group-sm">
                <button class="btn btn-outline-info" onclick="bulkStatus('collected')">Mark Collected</button>
                <button class="btn btn-outline-primary" onclick="bulkStatus('in_progress')">Start Processing</button>
                <button class="btn btn-outline-success" onclick="bulkStatus('completed')">Complete</button>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table" id="orders-table">
                <thead>
                    <tr>
                        <th style="width:30px"><input type="checkbox" id="select-all" onchange="toggleSelectAll(this)"></th>
                        <th>#</th>
                        <th>Patient</th>
                        <th>Test</th>
                        <th>Category</th>
                        <th>Sample</th>
                        <th>Doctor</th>
                        <th>Priority</th>
                        <th>Ordered</th>
                        <th>Status</th>
                        <th style="width:90px">Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="orders-empty" class="text-center text-muted py-5" style="display:none">
            <i class="bi bi-journal-x" style="font-size:2rem;display:block;margin-bottom:0.5rem"></i>
            No orders found
        </div>
    </div>
</div>

<script>
let allOrders = [];
let selectedIds = new Set();

document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('filter-to').value = new Date().toISOString().split('T')[0];
    loadOrders();
    document.getElementById('filter-status').addEventListener('change', loadOrders);
    document.getElementById('filter-category').addEventListener('change', loadOrders);
    document.getElementById('filter-priority').addEventListener('change', loadOrders);
    let searchTimer;
    document.getElementById('filter-search').addEventListener('input', function() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(loadOrders, 300);
    });
});

async function loadOrders() {
    const status = document.getElementById('filter-status').value;
    const category = document.getElementById('filter-category').value;
    const priority = document.getElementById('filter-priority').value;
    const search = document.getElementById('filter-search').value;
    const from = document.getElementById('filter-from').value;
    const to = document.getElementById('filter-to').value;
    let url = '/lab/api/orders?';
    if (status) url += 'status=' + status + '&';
    if (category) url += 'category=' + category + '&';
    if (priority) url += 'priority=' + priority + '&';
    if (search) url += 'search=' + encodeURIComponent(search) + '&';
    if (from) url += 'date_from=' + from + '&';
    if (to) url += 'date_to=' + to + '&';
    const res = await fetchWithAuth(url);
    allOrders = await res.json();
    selectedIds.clear();
    updateBulkActions();
    renderTable();
}

function renderTable() {
    const tbody = document.querySelector('#orders-table tbody');
    const empty = document.getElementById('orders-empty');
    tbody.innerHTML = '';
    document.getElementById('total-count').textContent = allOrders.length;
    if (allOrders.length) {
        document.getElementById('orders-table').style.display = '';
        empty.style.display = 'none';
        const colors = { ordered: 'secondary', collected: 'info', in_progress: 'primary', completed: 'success' };
        const prioColors = { urgent: 'danger', stat: 'danger', normal: '' };
        const catLabels = { haematology: 'Haem', parasitology: 'Para', microbiology: 'Micro', chemistry: 'Chem', lipogram: 'Lipo', u_and_e: 'U&E', cardiac: 'Cardiac', serology: 'Sero', tumour_markers: 'Tumour', endocrinology: 'Endo', fertility: 'Fertility', radiology: 'Radio', general: 'General' };
        const sampleLabels = { blood: 'Blood', urine: 'Urine', stool: 'Stool', semen: 'Semen', specimen: 'Specimen', radiology: 'Radiology' };
        allOrders.forEach(o => {
            const isUrgent = o.priority && o.priority !== 'normal';
            const rowClass = isUrgent ? 'table-danger' : (o.status === 'completed' ? '' : '');
            tbody.innerHTML += '<tr class="' + rowClass + '">' +
                '<td><input type="checkbox" class="order-check" value="' + o.id + '" onchange="toggleSelect(' + o.id + ', this)"></td>' +
                '<td><span class="fw-semibold">' + o.id + '</span></td>' +
                '<td><a href="/patients/' + o.patient_id + '" class="text-decoration-none fw-semibold" style="color:#0f172a">' + (o.p_first || '') + ' ' + (o.p_last || '') + '</a><br><small class="text-muted">' + (o.p_patient_id || '') + '</small></td>' +
                '<td>' + escHtml(o.test_name || '') + '</td>' +
                '<td><span class="badge bg-secondary bg-opacity-10 text-secondary">' + (catLabels[o.test_category] || o.test_category || '') + '</span></td>' +
                '<td><small class="text-muted">' + (sampleLabels[o.sample_type] || o.sample_type || '-') + '</small></td>' +
                '<td><small>Dr. ' + (o.d_first || '') + ' ' + (o.d_last || '') + '</small></td>' +
                '<td>' + (isUrgent ? '<span class="badge bg-' + (prioColors[o.priority] || 'secondary') + '">' + (o.priority || '').toUpperCase() + '</span>' : '<span class="text-muted">-</span>') + '</td>' +
                '<td><small>' + (o.ordered_date || '') + '</small></td>' +
                '<td><span class="badge bg-' + (colors[o.status] || 'secondary') + '">' + (o.status || '').replace('_', ' ') + '</span></td>' +
                '<td><a href="/lab/orders/' + o.id + '" class="btn-action view"><i class="bi bi-eye"></i></a></td></tr>';
        });
    } else {
        document.getElementById('orders-table').style.display = 'none';
        empty.style.display = 'block';
    }
}

function resetFilters() {
    document.getElementById('filter-status').value = '';
    document.getElementById('filter-category').value = '';
    document.getElementById('filter-priority').value = '';
    document.getElementById('filter-search').value = '';
    document.getElementById('filter-from').value = '';
    loadOrders();
}

function toggleSelectAll(el) {
    document.querySelectorAll('.order-check').forEach(cb => {
        cb.checked = el.checked;
        const id = parseInt(cb.value);
        if (el.checked) selectedIds.add(id); else selectedIds.delete(id);
    });
    updateBulkActions();
}

function toggleSelect(id, el) {
    if (el.checked) selectedIds.add(id); else selectedIds.delete(id);
    updateBulkActions();
}

function updateBulkActions() {
    const bar = document.getElementById('bulk-actions');
    if (selectedIds.size > 0) {
        bar.style.display = '';
        document.getElementById('selected-count').textContent = selectedIds.size;
    } else {
        bar.style.display = 'none';
    }
}

async function bulkStatus(status) {
    if (!selectedIds.size) return;
    if (!confirm('Update ' + selectedIds.size + ' orders to "' + status.replace('_', ' ') + '"?')) return;
    const res = await fetchWithAuth('/lab/api/orders/bulk-status', {
        method: 'POST',
        body: JSON.stringify({ ids: Array.from(selectedIds), status })
    });
    if (res.ok) {
        showToast(selectedIds.size + ' orders updated', 'success');
        loadOrders();
    } else {
        const err = await res.json();
        showToast(err.error || 'Failed', 'danger');
    }
}

function escHtml(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}
</script>
{% endblock %}
