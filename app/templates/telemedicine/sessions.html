{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-camera-video"></i> Telemedicine Sessions</h4>
    <a href="/telemedicine/sessions/new" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>New Session</a>
</div>

<div class="card mb-3">
    <div class="card-body">
        <div class="row g-2 align-items-end">
            <div class="col-md-2"><label class="form-label">Status</label>
                <select class="form-select" id="filter-status"><option value="">All</option>
                    <option value="scheduled">Scheduled</option><option value="waiting">Waiting</option>
                    <option value="in_progress">In Progress</option><option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option></select></div>
            <div class="col-md-2"><label class="form-label">Type</label>
                <select class="form-select" id="filter-type"><option value="">All</option>
                    <option value="video">Video</option><option value="audio">Audio</option><option value="chat">Chat</option></select></div>
            <div class="col-md-3"><label class="form-label">Patient</label><select class="form-select" id="filter-patient"><option value="">All</option></select></div>
            <div class="col-md-3"><label class="form-label">Doctor</label><select class="form-select" id="filter-doctor"><option value="">All</option></select></div>
            <div class="col-md-2"><button class="btn btn-primary w-100" onclick="loadSessions()"><i class="bi bi-search"></i></button></div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table mb-0" id="sessions-table">
                <thead><tr><th>Session #</th><th>Patient</th><th>Doctor</th><th>Type</th><th>Reason</th><th>Status</th><th>Date</th><th>Actions</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="sessions-empty" class="text-center text-muted py-5" style="display:none"><i class="bi bi-camera-video" style="font-size:2rem;display:block;margin-bottom:0.5rem"></i>No sessions found</div>
    </div>
</div>

<script>
const TYPE = {video:'Video Call',audio:'Audio Only',chat:'Chat'};
const ST = {scheduled:'secondary',waiting:'warning',in_progress:'primary',completed:'success',cancelled:'danger',no_show:'dark'};

document.addEventListener('DOMContentLoaded', async function() {
    const [pRes, dRes] = await Promise.all([fetchWithAuth('/patients/api'), fetchWithAuth('/telemedicine/api/doctors')]);
    const patients = await pRes.json();
    const doctors = await dRes.json();
    const pSel = document.getElementById('filter-patient');
    const dSel = document.getElementById('filter-doctor');
    patients.forEach(p => { const o = document.createElement('option'); o.value = p.id; o.textContent = p.patient_id + ' - ' + p.first_name + ' ' + p.last_name; pSel.appendChild(o); });
    doctors.forEach(d => { const o = document.createElement('option'); o.value = d.id; o.textContent = 'Dr. ' + d.first_name + ' ' + d.last_name; dSel.appendChild(o); });
    loadSessions();
});

async function loadSessions() {
    let url = '/telemedicine/api/sessions?';
    const s = document.getElementById('filter-status').value;
    const p = document.getElementById('filter-patient').value;
    const d = document.getElementById('filter-doctor').value;
    if (s) url += 'status=' + s + '&';
    if (p) url += 'patient_id=' + p + '&';
    if (d) url += 'doctor_id=' + d + '&';
    const res = await fetchWithAuth(url);
    const sessions = await res.json();
    const tbody = document.querySelector('#sessions-table tbody');
    const empty = document.getElementById('sessions-empty');
    tbody.innerHTML = '';
    if (sessions.length) {
        document.getElementById('sessions-table').style.display = '';
        empty.style.display = 'none';
        sessions.forEach(s => {
            tbody.innerHTML += '<tr><td><span class="fw-semibold">' + esc(s.session_id || '') + '</span></td>' +
                '<td>' + esc(s.p_first || '') + ' ' + esc(s.p_last || '') + '<br><small class="text-muted">' + esc(s.p_patient_id || '') + '</small></td>' +
                '<td>Dr. ' + esc(s.d_first || '') + ' ' + esc(s.d_last || '') + '</td>' +
                '<td>' + (TYPE[s.session_type] || s.session_type) + '</td>' +
                '<td>' + esc(s.reason || '-') + '</td>' +
                '<td><span class="badge bg-' + (ST[s.status] || 'secondary') + '">' + s.status.replace('_', ' ') + '</span></td>' +
                '<td>' + (s.created_at || '') + '</td>' +
                '<td class="text-nowrap">' +
                    (s.status === 'in_progress' ? '<a href="/telemedicine/sessions/' + s.id + '/room" class="btn btn-sm btn-success me-1" title="Join Call"><i class="bi bi-camera-video"></i></a>' : '') +
                    '<a href="/telemedicine/sessions/' + s.id + '" class="btn-action view" title="View"><i class="bi bi-eye"></i></a>' +
                '</td></tr>';
        });
    } else { document.getElementById('sessions-table').style.display = 'none'; empty.style.display = 'block'; }
}
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
{% endblock %}
