<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Kayange Clinic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon"><i class="bi bi-hospital"></i></div>
                <h3>Kayange Clinic</h3>
                <p>Sign in to your account</p>
            </div>
            <div class="login-body">
                <div class="alert alert-danger d-none" id="login-error" role="alert"></div>
                <form id="login-form">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" placeholder="Enter username" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-login">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        function safeLocalStorage(key, value) {
            try {
                if (value === undefined) return localStorage.getItem(key);
                if (value === null) localStorage.removeItem(key);
                else localStorage.setItem(key, value);
            } catch (e) {
                console.warn('localStorage error:', e);
                if (e.name === 'QuotaExceededError' || e.name === 'NS_ERROR_FILE_TOO_BIG') {
                    try { localStorage.clear(); } catch (e2) {}
                }
                return null;
            }
        }

        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const errorEl = document.getElementById('login-error');
            errorEl.classList.add('d-none');

            try {
                const res = await fetch('/auth/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();
                if (!res.ok) {
                    errorEl.textContent = data.error || 'Login failed';
                    errorEl.classList.remove('d-none');
                    return;
                }
                safeLocalStorage('token', data.token);
                safeLocalStorage('user', JSON.stringify(data.user));
                window.location.href = '/dashboard';
            } catch (err) {
                errorEl.textContent = 'Connection error. Please try again.';
                errorEl.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
