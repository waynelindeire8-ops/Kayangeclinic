<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayange Clinic Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2-bootstrap-5-theme.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body>
    <div id="wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-icon"><i class="bi bi-hospital"></i></div>
                <div class="logo-text">
                    <h6>Kayange Clinic</h6>
                    <small>Management System</small>
                </div>
            </div>

            <div class="sidebar-section">Main</div>
            <ul class="sidebar-nav" id="sidebar-nav">
                <li class="nav-item" data-roles="all">
                    <a class="nav-link" href="/dashboard"><i class="bi bi-grid-1x2"></i>Dashboard</a>
                </li>
                <li class="nav-item" data-roles="all">
                    <a class="nav-link" href="/patients"><i class="bi bi-people"></i>Patients</a>
                </li>
                <li class="nav-item" data-roles="admin,front_desk,doctor,locum_doctor">
                    <a class="nav-link" href="/appointments"><i class="bi bi-calendar-check"></i>Appointments</a>
                </li>
                <li class="nav-item" data-roles="admin,doctor,front_desk">
                    <a class="nav-link" href="/reports"><i class="bi bi-bar-chart-line"></i>Reports</a>
                </li>
            </ul>

            <div class="sidebar-section">Clinical</div>
            <ul class="sidebar-nav">
                <li class="nav-item" data-roles="doctor,locum_doctor,nurse,locum_nurse,admin">
                    <a class="nav-link" href="/consultations"><i class="bi bi-clipboard2-pulse"></i>Consultations</a>
                </li>
                <li class="nav-item" data-roles="admin,front_desk">
                    <a class="nav-link" href="/billing"><i class="bi bi-wallet2"></i>Billing</a>
                </li>
                <li class="nav-item" data-roles="admin,lab_staff,doctor,locum_doctor">
                    <a class="nav-link" href="/pharmacy"><i class="bi bi-capsule"></i>Pharmacy</a>
                </li>
            </ul>

            <div class="sidebar-section">Administration</div>
            <ul class="sidebar-nav">
                <li class="nav-item" data-roles="admin">
                    <a class="nav-link" href="/doctors"><i class="bi bi-stethoscope"></i>Doctors</a>
                </li>
                <li class="nav-item" data-roles="admin">
                    <a class="nav-link" href="/departments"><i class="bi bi-building"></i>Departments</a>
                </li>
                <li class="nav-item" data-roles="admin">
                    <a class="nav-link" href="/staff"><i class="bi bi-gear"></i>Settings</a>
                </li>
                <li class="nav-item" data-roles="all">
                    <a class="nav-link logout-link" href="#" onclick="logout()"><i class="bi bi-box-arrow-left"></i>Logout</a>
                </li>
            </ul>

            <div class="sidebar-user" id="sidebar-user-area">
                <div class="d-flex align-items-center gap-2">
                    <div class="user-avatar" id="user-avatar">SA</div>
                    <div class="user-info">
                        <div class="user-name" id="sidebar-user-name">System Admin</div>
                        <div class="user-role" id="sidebar-user-role">Administrator</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="topbar">
                <div class="d-flex align-items-center gap-3">
                    <button class="btn d-lg-none p-0 border-0" onclick="toggleSidebar()" style="font-size:1.25rem">
                        <i class="bi bi-list"></i>
                    </button>
                    <h5 class="page-title" id="page-title">Dashboard</h5>
                </div>
                <div class="topbar-search">
                    <i class="bi bi-search"></i>
                    <input type="text" placeholder="Search patients..." id="global-search">
                </div>
                <div class="topbar-actions">
                    <button class="btn-icon" title="Notifications">
                        <i class="bi bi-bell"></i>
                        <span class="badge-dot"></span>
                    </button>
                    <div class="topbar-user-btn" id="topbar-user-btn">
                        <div class="avatar" id="topbar-avatar">SA</div>
                        <span class="user-name-small d-none d-md-inline" id="topbar-user-name">Admin</span>
                    </div>
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            if (!token) { window.location.href = '/auth/login'; return; }

            const initials = (user.first_name || 'U').charAt(0) + (user.last_name || '').charAt(0);
            document.getElementById('sidebar-user-name').textContent = user.first_name + ' ' + user.last_name;
            document.getElementById('sidebar-user-role').textContent = user.role.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
            document.getElementById('user-avatar').textContent = initials;
            document.getElementById('topbar-avatar').textContent = initials;
            document.getElementById('topbar-user-name').textContent = user.first_name || 'User';

            document.querySelectorAll('#sidebar-nav .nav-item').forEach(item => {
                const roles = item.dataset.roles;
                if (roles !== 'all' && !roles.split(',').includes(user.role)) {
                    item.style.display = 'none';
                }
            });

            const path = window.location.pathname;
            document.querySelectorAll('#sidebar-nav .nav-link').forEach(link => {
                const href = link.getAttribute('href');
                if (href && href !== '#' && path.startsWith(href) && href !== '/dashboard') {
                    link.classList.add('active');
                } else if (href === '/dashboard' && path === '/dashboard') {
                    link.classList.add('active');
                }
            });

            const titles = {
                '/dashboard': 'Dashboard',
                '/patients': 'Patients',
                '/appointments': 'Appointments',
                '/consultations': 'Consultations',
                '/billing': 'Billing',
                '/pharmacy': 'Pharmacy',
                '/doctors': 'Doctors',
                '/departments': 'Departments',
                '/staff': 'Settings',
                '/reports': 'Reports'
            };
            for (const [key, val] of Object.entries(titles)) {
                if (path.startsWith(key)) { document.getElementById('page-title').textContent = val; break; }
            }
        });

        function setCookie(name, value, days) {
            var expires = '';
            if (days) { var d = new Date(); d.setTime(d.getTime() + days*24*60*60*1000); expires = '; expires=' + d.toUTCString(); }
            document.cookie = name + '=' + (value || '') + expires + '; path=/';
        }
        function getCookie(name) {
            var nameEQ = name + '=';
            var ca = document.cookie.split(';');
            for (var i=0; i < ca.length; i++) { var c = ca[i].trim(); if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length); }
            return null;
        }
        function eraseCookie(name) { document.cookie = name + '=; Max-Age=-99999999; path=/'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('show'); }
        function logout() {
            eraseCookie('access_token');
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/auth/login';
        }

        // Sync token from localStorage to cookie for page navigation auth
        (function() {
            var token = localStorage.getItem('token');
            if (token && !getCookie('access_token')) {
                setCookie('access_token', token, 1);
            }
        })();

        document.getElementById('global-search')?.addEventListener('keyup', function(e) {
            if (e.key === 'Enter' && this.value.trim()) {
                window.location.href = '/patients?search=' + encodeURIComponent(this.value.trim());
            }
        });
    </script>
</body>
</html>
