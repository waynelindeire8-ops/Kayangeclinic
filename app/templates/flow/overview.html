{% extends "base.html" %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <h4><i class="bi bi-hospital"></i> Patient Flow - Department Overview</h4>
    <div>
        <span class="text-muted small" id="last-update"></span>
        <button class="btn btn-sm btn-outline-primary ms-2" onclick="loadOverview()"><i class="bi bi-arrow-clockwise"></i> Refresh</button>
    </div>
</div>

<div class="row g-3 mb-4" id="dept-cards"></div>

<div class="card">
    <div class="card-header"><h6><i class="bi bi-clock-history me-1"></i> Recent Activity</h6></div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-sm mb-0">
                <thead><tr><th>Time</th><th>Patient</th><th>From</th><th>To</th><th>Moved By</th><th>Notes</th></tr></thead>
                <tbody id="log-tbody"></tbody>
            </table>
        </div>
        <div id="log-empty" class="text-center text-muted py-4" style="display:none">No recent transfers</div>
    </div>
</div>

<!-- Transfer Modal -->
<div class="modal fade" id="transferModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-arrow-right-circle me-1"></i>Transfer Patient</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="transfer-patient-id">
                <div class="mb-3">
                    <label class="form-label">Patient</label>
                    <div id="transfer-patient-name" class="fw-semibold"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Current Department</label>
                    <div id="transfer-from-dept" class="text-muted"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Transfer To *</label>
                    <select class="form-select" id="transfer-to-dept"></select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Notes</label>
                    <textarea class="form-control" id="transfer-notes" rows="2" placeholder="Optional notes..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="confirmTransfer()"><i class="bi bi-check-lg me-1"></i>Transfer</button>
            </div>
        </div>
    </div>
</div>

<script>
let allDepartments = [];

async function loadOverview() {
    try {
        const res = await fetchWithAuth('/flow/api/overview');
        const data = await res.json();
        allDepartments = data.departments || [];
        renderDeptCards();
        document.getElementById('last-update').textContent = 'Updated: ' + new Date().toLocaleTimeString();
    } catch(e) {
        console.error('Failed to load overview:', e);
    }

    try {
        const logRes = await fetchWithAuth('/flow/api/log?limit=20');
        const logData = await logRes.json();
        renderLog(logData.log || []);
    } catch(e) {
        console.error('Failed to load log:', e);
    }
}

function renderDeptCards() {
    const container = document.getElementById('dept-cards');
    const colors = ['primary','success','warning','danger','info','secondary','primary','dark','warning'];
    container.innerHTML = allDepartments.map((d, i) => {
        const patientsHtml = d.patients.length ? d.patients.map(p => {
            const statusBadge = p.status === 'in_progress' ? 'bg-success' : p.status === 'waiting' ? 'bg-warning text-dark' : 'bg-secondary';
            return '<div class="d-flex align-items-center justify-content-between py-1 border-bottom">' +
                '<div><a href="/patients/' + p.patient_id + '" class="text-decoration-none fw-semibold">' + (p.first_name||'') + ' ' + (p.last_name||'') + '</a>' +
                '<br><small class="text-muted">' + (p.patient_code||'') + '</small></div>' +
                '<div class="text-end"><span class="badge ' + statusBadge + '">' + p.status + '</span>' +
                '<br><button class="btn btn-sm btn-outline-primary mt-1" onclick="openTransfer(' + p.patient_id + ',' + d.id + ',\'' + (p.first_name||'') + ' ' + (p.last_name||'') + '\',\'' + d.name + '\')"><i class="bi bi-arrow-right"></i></button></div>' +
                '</div>';
        }).join('') : '<div class="text-center text-muted py-3">No patients</div>';

        return '<div class="col-sm-6 col-lg-4 col-xl-3">' +
            '<div class="card h-100">' +
            '<div class="card-header d-flex justify-content-between align-items-center">' +
            '<h6 class="mb-0"><i class="bi bi-building text-' + colors[i % colors.length] + ' me-1"></i>' + d.name + '</h6>' +
            '<span class="badge bg-' + colors[i % colors.length] + '">' + d.patient_count + '</span>' +
            '</div>' +
            '<div class="card-body p-2" style="max-height:300px;overflow-y:auto">' + patientsHtml + '</div>' +
            '</div></div>';
    }).join('');
}

function renderLog(log) {
    const tbody = document.getElementById('log-tbody');
    const empty = document.getElementById('log-empty');
    if (!log.length) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';
    tbody.innerHTML = log.map(l => '<tr>' +
        '<td><small>' + (l.created_at||'').substring(0,16) + '</small></td>' +
        '<td><a href="/patients/' + l.patient_id + '" class="text-decoration-none">' + (l.p_first||'') + ' ' + (l.p_last||'') + '</a></td>' +
        '<td>' + (l.from_dept_name||'<em>Initial</em>') + '</td>' +
        '<td><span class="badge bg-primary">' + (l.to_dept_name||'') + '</span></td>' +
        '<td><small>' + (l.moved_first||'') + ' ' + (l.moved_last||'') + '</small></td>' +
        '<td><small class="text-muted">' + (l.notes||'') + '</small></td>' +
        '</tr>').join('');
}

function openTransfer(patientId, currentDeptId, patientName, deptName) {
    document.getElementById('transfer-patient-id').value = patientId;
    document.getElementById('transfer-patient-name').textContent = patientName;
    document.getElementById('transfer-from-dept').textContent = deptName;
    document.getElementById('transfer-notes').value = '';
    const sel = document.getElementById('transfer-to-dept');
    sel.innerHTML = allDepartments.filter(d => d.id !== currentDeptId).map(d =>
        '<option value="' + d.id + '">' + d.name + '</option>'
    ).join('');
    new bootstrap.Modal(document.getElementById('transferModal')).show();
}

async function confirmTransfer() {
    const patientId = document.getElementById('transfer-patient-id').value;
    const toDeptId = document.getElementById('transfer-to-dept').value;
    const notes = document.getElementById('transfer-notes').value;
    try {
        const res = await fetchWithAuth('/flow/api/transfer', {
            method: 'POST', body: JSON.stringify({patient_id: parseInt(patientId), to_department_id: parseInt(toDeptId), notes})
        });
        if (res.ok) {
            bootstrap.Modal.getInstance(document.getElementById('transferModal')).hide();
            loadOverview();
        } else {
            const err = await res.json();
            alert(err.error || 'Transfer failed');
        }
    } catch(e) {
        alert('Error: ' + e.message);
    }
}

document.addEventListener('DOMContentLoaded', loadOverview);
setInterval(loadOverview, 30000);
</script>
{% endblock %}
