<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{ code }} — Kayange Clinic</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:#f0f2f5; margin:0; }
        .error-card { text-align:center; background:#fff; border-radius:12px; padding:3rem 2.5rem; box-shadow:0 4px 24px rgba(0,0,0,.08); max-width:420px; width:100%; }
        .error-code { font-size:4rem; font-weight:800; color:#e74c3c; line-height:1; }
        .error-icon { font-size:3rem; color:#e74c3c; margin-bottom:1rem; }
        .error-msg { color:#555; margin:1rem 0 1.5rem; }
        .btn-home { background:#27ae60; border:none; color:#fff; padding:.6rem 2rem; border-radius:8px; font-weight:600; text-decoration:none; display:inline-block; }
        .btn-home:hover { background:#219a52; color:#fff; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-icon"><i class="bi bi-shield-lock"></i></div>
        <div class="error-code">{{ code }}</div>
        <p class="error-msg">{{ message }}</p>
        <a href="/" class="btn-home"><i class="bi bi-house me-1"></i>Go to Dashboard</a>
    </div>
</body>
</html>
