<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prescription #{{ order_id }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @page { margin: 15mm; }
        body { font-family: 'Courier New', monospace; font-size: 12pt; color: #000; background: #fff; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .header h2 { margin: 0; font-weight: bold; }
        .header p { margin: 2px 0; font-size: 11pt; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px 20px; margin-bottom: 20px; }
        .info-grid .label { font-weight: bold; }
        table.items { width: 100%; border-collapse: collapse; margin-top: 15px; }
        table.items th { border-bottom: 2px solid #000; padding: 6px 4px; text-align: left; font-size: 11pt; }
        table.items td { border-bottom: 1px solid #ccc; padding: 6px 4px; font-size: 11pt; }
        .footer { margin-top: 40px; text-align: center; font-size: 10pt; color: #666; border-top: 1px solid #ccc; padding-top: 10px; }
        .stamp-area { margin-top: 30px; }
        .stamp-area td { padding: 0 20px; font-size: 11pt; }
        .no-print { display: none; }
        @media print { .no-print { display: none; } body { padding: 0; } }
    </style>
</head>
<body>
    <div id="print-area">
        <div class="spinner-border spinner-border-sm" id="spinner"></div>
    </div>
    <div class="no-print mt-3">
        <button class="btn btn-primary" onclick="window.print()"><i class="bi bi-printer"></i> Print</button>
        <button class="btn btn-outline-secondary" onclick="window.close()">Close</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    const orderId = {{ order_id }};

    document.addEventListener('DOMContentLoaded', async function() {
        const [orderRes, cfgRes] = await Promise.all([
            fetch('/prescriptions/api/orders/' + orderId, {
                headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('token') || getCookie('access_token')) }
            }),
            fetch('/settings/api/system', {
                headers: { 'Authorization': 'Bearer ' + (localStorage.getItem('token') || getCookie('access_token')) }
            })
        ]);
        const data = await orderRes.json();
        const cfg = cfgRes.ok ? await cfgRes.json() : {};
        if (data.error) { document.getElementById('print-area').innerHTML = '<div class="alert alert-danger">' + data.error + '</div>'; return; }

        const clinicName = cfg.clinic_name || 'Kayange Clinic';
        const clinicAddress = cfg.clinic_address || 'Blantyre, Malawi';
        const clinicPhone = cfg.clinic_phone || '';
        const today = new Date().toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'});
        let itemsHtml = '';
        let totalCost = 0;
        (data.items || []).forEach((i, idx) => {
            const cost = (i.unit_price || 0) * (i.quantity || 0);
            totalCost += cost;
            itemsHtml += '<tr><td>' + (idx + 1) + '</td>' +
                '<td><strong>' + escHtml(i.drug_name) + '</strong><br><small>' + escHtml(i.instructions || '') + '</small></td>' +
                '<td>' + escHtml(i.dosage || '-') + '</td>' +
                '<td>' + escHtml(i.frequency || '-') + '</td>' +
                '<td>' + escHtml(i.route || '-') + '</td>' +
                '<td>' + escHtml(i.duration || '-') + '</td>' +
                '<td style="text-align:center">' + (i.quantity || '-') + '</td></tr>';
        });

        document.getElementById('print-area').innerHTML =
            '<div class="header"><h2>' + escHtml(clinicName).toUpperCase() + '</h2><p>' + escHtml(clinicAddress) + '</p>' +
            (clinicPhone ? '<p>Tel: ' + escHtml(clinicPhone) + '</p>' : '') +
            '<hr style="margin:5px 0"><h4>PRESCRIPTION</h4></div>' +
            '<div class="info-grid">' +
            '<div><span class="label">Patient:</span> ' + escHtml(data.p_first) + ' ' + escHtml(data.p_last) + '</div>' +
            '<div><span class="label">Date:</span> ' + today + '</div>' +
            '<div><span class="label">ID:</span> ' + (data.p_patient_id || '') + '</div>' +
            '<div><span class="label">Doctor:</span> Dr. ' + escHtml(data.d_first) + ' ' + escHtml(data.d_last) + '</div>' +
            (data.p_phone ? '<div><span class="label">Phone:</span> ' + escHtml(data.p_phone) + '</div>' : '') +
            (data.notes ? '<div style="grid-column:1/-1"><span class="label">Notes:</span> ' + escHtml(data.notes) + '</div>' : '') +
            '</div>' +
            '<table class="items"><thead><tr><th>#</th><th>Drug</th><th>Dosage</th><th>Frequency</th><th>Route</th><th>Duration</th><th style="text-align:center">Qty</th></tr></thead><tbody>' +
            itemsHtml +
            '</tbody></table>' +
            '<table class="stamp-area"><tr><td>Doctor\'s Signature:</td><td>____________________</td><td>Stamp:</td><td>____________________</td></tr></table>' +
            '<div class="footer">This is a computer-generated prescription. Valid only with doctor\'s signature and stamp. | Ref #' + orderId + '</div>';

        window.print();
    });

    function getCookie(name) {
        const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
        return match ? match[2] : null;
    }

    function escHtml(str) {
        if (!str) return '';
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
    }
    </script>
</body>
</html>
