{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-file-earmark-medical"></i> Claim <span id="claim-num"></span></h4>
    <div class="d-flex gap-2">
        <a href="/insurance/claims/{{ claim_id }}/edit" class="btn btn-primary"><i class="bi bi-pencil me-1"></i>Edit</a>
        <a href="/insurance/claims" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
    </div>
</div>

<div class="row g-3">
    <div class="col-lg-5">
        <div class="card">
            <div class="card-header"><h6>Claim Details</h6></div>
            <div class="card-body" id="claim-info"><div class="text-center py-3"><span class="spinner-border spinner-border-sm"></span></div></div>
        </div>

        <div class="card mt-3">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h6>Actions</h6>
            </div>
            <div class="card-body" id="actions-area"></div>
        </div>
    </div>

    <div class="col-lg-7">
        <div class="card">
            <div class="card-header"><h6>Claim Items</h6></div>
            <div class="card-body p-0" id="items-list"><div class="text-center py-3"><span class="spinner-border spinner-border-sm"></span></div></div>
        </div>

        <div class="card mt-3">
            <div class="card-header"><h6>Status History</h6></div>
            <div class="card-body p-0" id="history-list"><div class="text-center py-3"><span class="spinner-border spinner-border-sm"></span></div></div>
        </div>
    </div>
</div>

<div class="modal fade" id="statusModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="status-form">
                <div class="modal-header"><h5 class="modal-title" id="status-title">Update Status</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                <div class="modal-body">
                    <input type="hidden" id="new-status">
                    <div class="mb-3" id="approved-amount-group" style="display:none"><label class="form-label">Approved Amount (MWK)</label><input type="number" class="form-control" id="approved-amount" min="0" step="0.01"></div>
                    <div class="mb-3" id="paid-amount-group" style="display:none"><label class="form-label">Paid Amount (MWK)</label><input type="number" class="form-control" id="paid-amount" min="0" step="0.01"></div>
                    <div class="mb-3" id="denial-reason-group" style="display:none"><label class="form-label">Denial Reason</label><textarea class="form-control" id="denial-reason" rows="2"></textarea></div>
                    <div class="mb-3"><label class="form-label">Notes</label><textarea class="form-control" id="status-notes" rows="2"></textarea></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary px-3" id="btn-status-save">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
const claimId = {{ claim_id }};

document.addEventListener('DOMContentLoaded', loadData);

async function loadData() {
    const res = await fetchWithAuth('/insurance/api/claims/' + claimId);
    const data = await res.json();
    if (data.error) { document.getElementById('claim-info').innerHTML = '<div class="alert alert-danger mb-0">' + data.error + '</div>'; return; }

    document.getElementById('claim-num').textContent = data.claim_number;
    const sc = {draft:'secondary',submitted:'info',in_review:'primary',additional_info:'warning',approved:'success',partially_approved:'success',denied:'danger',appealed:'warning',paid:'success',cancelled:'secondary'};

    document.getElementById('claim-info').innerHTML =
        '<table class="table-details">' +
        '<tr><td>Claim #</td><td><strong>' + esc(data.claim_number) + '</strong></td></tr>' +
        '<tr><td>Patient</td><td><strong><a href="/patients/' + data.patient_id + '">' + esc(data.p_first) + ' ' + esc(data.p_last) + '</a></strong><br><small>' + esc(data.p_patient_id || '') + ' | ' + esc(data.dob || '') + ' | ' + esc(data.gender || '') + '</small></td></tr>' +
        '<tr><td>Provider</td><td><strong>' + esc(data.provider_name) + '</strong><br><small>Code: ' + esc(data.provider_code || '') + '</small></td></tr>' +
        '<tr><td>Policy</td><td>' + esc(data.policy_number || 'N/A') + (data.member_name ? '<br><small>Member: ' + esc(data.member_name) + '</small>' : '') + '</td></tr>' +
        '<tr><td>Status</td><td><span class="badge bg-' + (sc[data.status] || 'secondary') + ' fs-6">' + data.status.replace(/_/g, ' ') + '</span></td></tr>' +
        '<tr><td>Service Date</td><td>' + (data.service_date || '-') + '</td></tr>' +
        '<tr><td>Created</td><td>' + (data.created_at ? new Date(data.created_at).toLocaleString() : '') + '</td></tr>' +
        (data.submitted_date ? '<tr><td>Submitted</td><td>' + data.submitted_date + '</td></tr>' : '') +
        (data.reviewed_date ? '<tr><td>Reviewed</td><td>' + data.reviewed_date + '</td></tr>' : '') +
        (data.paid_date ? '<tr><td>Paid</td><td>' + data.paid_date + '</td></tr>' : '') +
        (data.denial_reason ? '<tr><td>Denial Reason</td><td class="text-danger">' + esc(data.denial_reason) + '</td></tr>' : '') +
        '</table>' +
        '<table class="table-details mt-2"><tr><td>Total Claimed</td><td><strong>MWK ' + Number(data.total_amount || 0).toLocaleString('en-MW', {minimumFractionDigits:2}) + '</strong></td></tr>' +
        '<tr><td>Approved</td><td>MWK ' + Number(data.approved_amount || 0).toLocaleString('en-MW', {minimumFractionDigits:2}) + '</td></tr>' +
        '<tr><td>Paid</td><td><strong>MWK ' + Number(data.paid_amount || 0).toLocaleString('en-MW', {minimumFractionDigits:2}) + '</strong></td></tr></table>';

    // Actions based on status
    const actions = document.getElementById('actions-area');
    let actionsHtml = '';
    if (data.status === 'draft') actionsHtml += '<button class="btn btn-primary w-100 mb-2" onclick="updateStatus(\'submitted\')"><i class="bi bi-send me-1"></i>Submit Claim</button>';
    if (data.status === 'submitted') actionsHtml += '<button class="btn btn-primary w-100 mb-2" onclick="updateStatus(\'in_review\')"><i class="bi bi-search me-1"></i>Start Review</button>';
    if (data.status === 'in_review') {
        actionsHtml += '<button class="btn btn-success w-100 mb-2" onclick="updateStatus(\'approved\')"><i class="bi bi-check-lg me-1"></i>Approve</button>';
        actionsHtml += '<button class="btn btn-warning w-100 mb-2" onclick="updateStatus(\'additional_info\')"><i class="bi bi-info-circle me-1"></i>Request Info</button>';
        actionsHtml += '<button class="btn btn-danger w-100 mb-2" onclick="updateStatus(\'denied\')"><i class="bi bi-x-lg me-1"></i>Deny</button>';
    }
    if (data.status === 'approved') actionsHtml += '<button class="btn btn-success w-100 mb-2" onclick="updateStatus(\'paid\')"><i class="bi bi-cash me-1"></i>Mark as Paid</button>';
    if (data.status === 'denied') actionsHtml += '<button class="btn btn-warning w-100 mb-2" onclick="updateStatus(\'appealed\')"><i class="bi bi-arrow-repeat me-1"></i>File Appeal</button>';
    if (data.status !== 'paid' && data.status !== 'cancelled') actionsHtml += '<button class="btn btn-outline-danger w-100" onclick="updateStatus(\'cancelled\')"><i class="bi bi-x-circle me-1"></i>Cancel Claim</button>';
    if (!actionsHtml) actionsHtml = '<div class="text-muted text-center py-2">No actions available</div>';
    actions.innerHTML = actionsHtml;

    // Items
    const itemsList = document.getElementById('items-list');
    if (data.items && data.items.length) {
        let html = '<table class="table mb-0"><thead><tr><th>Description</th><th>Code</th><th>Qty</th><th>Unit Price</th><th>Total</th></tr></thead><tbody>';
        data.items.forEach(i => { html += '<tr><td>' + esc(i.description) + '</td><td>' + esc(i.procedure_code || '-') + '</td><td>' + i.quantity + '</td><td>MWK ' + Number(i.unit_price).toLocaleString('en-MW') + '</td><td>MWK ' + Number(i.total_price).toLocaleString('en-MW') + '</td></tr>'; });
        html += '</tbody></table>';
        itemsList.innerHTML = html;
    } else { itemsList.innerHTML = '<div class="text-center text-muted py-3">No items</div>'; }

    // History
    const histList = document.getElementById('history-list');
    if (data.history && data.history.length) {
        let html = '';
        data.history.forEach(h => {
            html += '<div class="p-3 border-bottom"><div class="d-flex justify-content-between"><span class="badge bg-' + (sc[h.new_status] || 'secondary') + '">' + h.new_status.replace(/_/g, ' ') + '</span><small class="text-muted">' + (h.changed_at ? new Date(h.changed_at).toLocaleString() : '') + '</small></div>' +
                (h.old_status ? '<small class="text-muted">From: ' + h.old_status.replace(/_/g, ' ') + '</small>' : '') +
                (h.notes ? '<div class="mt-1 small">' + esc(h.notes) + '</div>' : '') +
                (h.u_first ? '<small class="text-muted">by ' + esc(h.u_first) + ' ' + esc(h.u_last) + '</small>' : '') +
                '</div>';
        });
        histList.innerHTML = html;
    } else { histList.innerHTML = '<div class="text-center text-muted py-3">No history</div>'; }
}

function updateStatus(status) {
    document.getElementById('new-status').value = status;
    document.getElementById('status-title').textContent = 'Update to: ' + status.replace(/_/g, ' ');
    document.getElementById('approved-amount-group').style.display = ['approved', 'partially_approved'].includes(status) ? 'block' : 'none';
    document.getElementById('paid-amount-group').style.display = status === 'paid' ? 'block' : 'none';
    document.getElementById('denial-reason-group').style.display = status === 'denied' ? 'block' : 'none';
    document.getElementById('status-notes').value = '';
    new bootstrap.Modal(document.getElementById('statusModal')).show();
}

document.getElementById('status-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const status = document.getElementById('new-status').value;
    const body = { status, notes: document.getElementById('status-notes').value.trim() };
    if (['approved', 'partially_approved'].includes(status)) body.approved_amount = parseFloat(document.getElementById('approved-amount').value) || 0;
    if (status === 'paid') body.paid_amount = parseFloat(document.getElementById('paid-amount').value) || 0;
    if (status === 'denied') body.notes = document.getElementById('denial-reason').value.trim() + (body.notes ? '\n' + body.notes : '');
    const btn = document.getElementById('btn-status-save');
    btn.disabled = true;
    const res = await fetchWithAuth('/insurance/api/claims/' + claimId + '/status', { method: 'PUT', body: JSON.stringify(body) });
    btn.disabled = false;
    if (res.ok) { bootstrap.Modal.getInstance(document.getElementById('statusModal')).hide(); loadData(); showToast('Status updated', 'success'); }
    else { const err = await res.json(); showToast(err.error || 'Failed', 'danger'); }
});

function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>

<style>
.table-details td { padding: 0.375rem 0.5rem; vertical-align: top; }
.table-details tr td:first-child { font-weight: 500; color: #64748b; width: 1%; white-space: nowrap; padding-right: 1rem; }
</style>
{% endblock %}
