{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-stethoscope"></i> Doctors</h4>
    <a href="/doctors/new" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>Add Doctor</a>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table" id="doctors-table">
                <thead>
                    <tr>
                        <th>Doctor</th>
                        <th>Username</th>
                        <th>Role</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const avatarColors = ['#16a34a','#2563eb','#f59e0b','#dc2626','#9333ea','#0ea5e9','#ec4899'];
    let ci = 0;

    $('#doctors-table').DataTable({
        ajax: function(data, callback, settings) { fetchWithAuth('/doctors/api?' + $.param(data)).then(r => { if (r.status === 401) throw new Error('Unauthorized'); return r.json(); }).then(d => callback({data:d})).catch(() => callback({data:[]})); },
        columns: [
            { data: null, render: function(d) {
                const initials = (d.first_name || 'D').charAt(0) + (d.last_name || '').charAt(0);
                const color = avatarColors[ci++ % avatarColors.length];
                return '<div class="patient-cell"><div class="patient-avatar" style="background:' + color + '">' + initials + '</div><div class="fw-semibold" style="color:#0f172a">' + d.first_name + ' ' + d.last_name + '</div></div>';
            }},
            { data: 'username' },
            { data: 'role', render: d => d === 'doctor' ? '<span class="badge bg-success">Doctor</span>' : '<span class="badge bg-warning">Locum Doctor</span>' },
            { data: 'email', render: d => d || '-' },
            { data: 'phone', render: d => d || '-' },
            { data: null, render: d => d.is_active ? '<span class="badge bg-success">Active</span>' : '<span class="badge bg-secondary">Inactive</span>' },
            { data: null, render: d => '<div class="d-flex gap-1"><a href="/doctors/' + d.id + '/edit" class="btn-action edit" title="Edit"><i class="bi bi-pencil"></i></a><button class="btn-action delete" title="Delete" onclick="deleteDoctor(' + d.id + ')"><i class="bi bi-trash"></i></button></div>' }
        ],
        order: [[2, 'asc']],
        pageLength: 20
    });
});

async function deleteDoctor(id) {
    if (!confirm('Delete this doctor account?')) return;
    const res = await fetchWithAuth('/doctors/api/' + id, { method: 'DELETE' });
    if (res.ok) {
        $('#doctors-table').DataTable().ajax.reload();
    } else {
        const err = await res.json();
        alert(err.error || 'Error deleting doctor');
    }
}
</script>
{% endblock %}
