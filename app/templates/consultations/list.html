{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-clipboard2-pulse"></i> Consultations</h4>
    <a href="/consultations/new" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>New Consultation</a>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table" id="consultations-table">
                <thead>
                    <tr>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Date</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Patient</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Doctor</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Type</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Diagnosis</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    $('#consultations-table').DataTable({
        ajax: { url: '/consultations/api', dataSrc: '' },
        columns: [
            { data: 'created_at', render: d => new Date(d).toLocaleDateString() },
            { data: null, render: d => '<a href="/patients/' + d.patient_id + '" class="text-decoration-none fw-semibold" style="color:#0f172a">' + d.p_first + ' ' + d.p_last + '</a>' },
            { data: null, render: d => 'Dr. ' + (d.d_first || '') + ' ' + (d.d_last || '') },
            { data: 'consultation_type', render: d => '<span class="badge bg-success">' + (d || 'General') + '</span>' },
            { data: 'diagnosis', render: d => d || '-' },
            { data: null, render: d => '<a href="/patients/' + d.patient_id + '" class="btn-action view" title="View"><i class="bi bi-eye"></i></a>' }
        ],
        order: [[0, 'desc']],
        pageLength: 20
    });
});
</script>
{% endblock %}
