{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-calendar-check"></i> Appointments</h4>
    <div>
        <a href="/appointments/calendar" class="btn btn-outline-primary me-2"><i class="bi bi-calendar3 me-1"></i>Calendar</a>
        <a href="/appointments/new" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>New Appointment</a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div class="row mb-3">
            <div class="col-md-3">
                <select class="form-select" id="status-filter">
                    <option value="">All Status</option>
                    <option value="scheduled">Scheduled</option>
                    <option value="confirmed">Confirmed</option>
                    <option value="in_progress">In Progress</option>
                    <option value="completed">Completed</option>
                    <option value="cancelled">Cancelled</option>
                    <option value="no_show">No Show</option>
                </select>
            </div>
            <div class="col-md-3">
                <input type="date" class="form-control" id="date-filter">
            </div>
        </div>
        <div class="table-responsive">
            <table class="table" id="appointments-table">
                <thead>
                    <tr>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Date</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Time</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Patient</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Doctor</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Reason</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Type</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Status</th>
                        <th><i class="bi bi-arrow-down-up small me-1"></i>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('date-filter').value = today;

    let table = $('#appointments-table').DataTable({
        ajax: { url: '/appointments/api', dataSrc: '' },
        columns: [
            { data: 'appointment_date' },
            { data: 'appointment_time', render: d => '<span class="fw-semibold">' + d + '</span>' },
            { data: null, render: d => '<a href="/patients/' + d.patient_id + '" class="text-decoration-none fw-semibold" style="color:#0f172a">' + d.p_first + ' ' + d.p_last + '</a><br><small class="text-muted">' + (d.p_phone || '') + '</small>' },
            { data: null, render: d => 'Dr. ' + (d.d_first || 'Unassigned') + ' ' + (d.d_last || '') },
            { data: 'reason', render: d => d || '-' },
            { data: 'type', render: d => '<span class="badge bg-' + (d === 'online' ? 'info' : 'secondary') + '">' + d + '</span>' },
            { data: null, render: d => { const m = {scheduled:'warning',confirmed:'info',in_progress:'primary',completed:'success',cancelled:'secondary',no_show:'danger'}; return '<span class="badge bg-' + (m[d.status]||'secondary') + '">' + d.status + '</span>'; }},
            { data: null, render: d => '<div class="d-flex gap-1"><div class="dropdown"><button class="btn-action edit dropdown-toggle" data-bs-toggle="dropdown"><i class="bi bi-pencil"></i></button><ul class="dropdown-menu"><li><a class="dropdown-item" href="#" onclick="updateStatus(' + d.id + ',\'confirmed\')">Confirm</a></li><li><a class="dropdown-item" href="#" onclick="updateStatus(' + d.id + ',\'in_progress\')">Start</a></li><li><a class="dropdown-item" href="#" onclick="updateStatus(' + d.id + ',\'completed\')">Complete</a></li><li><a class="dropdown-item" href="#" onclick="updateStatus(' + d.id + ',\'cancelled\')">Cancel</a></li><li><a class="dropdown-item" href="#" onclick="updateStatus(' + d.id + ',\'no_show\')">No Show</a></li></ul></div></div>' }
        ],
        order: [[0, 'desc'], [1, 'asc']],
        pageLength: 20,
        language: { search: '', searchPlaceholder: 'Search...' }
    });

    $('#status-filter').on('change', function() { table.ajax.url('/appointments/api?status=' + this.value).load(); });
    $('#date-filter').on('change', function() { table.ajax.url('/appointments/api?date=' + this.value).load(); });
});

async function updateStatus(id, status) {
    await fetchWithAuth('/appointments/api/' + id + '/status', { method: 'PATCH', body: JSON.stringify({status}) });
    $('#appointments-table').DataTable().ajax.reload();
}
</script>
{% endblock %}
