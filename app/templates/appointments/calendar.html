{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-calendar3 me-2"></i>Appointment Calendar</h4>
    <a href="/appointments/new" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>New</a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <div id="calendar"></div>
    </div>
</div>

<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    const calendarEl = document.getElementById('calendar');
    const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'timeGridWeek',
        headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay'
        },
        slotMinTime: '08:00',
        slotMaxTime: '18:00',
        height: 'auto',
        events: async function(fetchInfo, successCallback) {
            const res = await fetchWithAuth('/appointments/api');
            const data = await res.json();
            successCallback(data.map(apt => ({
                id: apt.id,
                title: `${apt.p_first} ${apt.p_last}${apt.reason ? ' - ' + apt.reason : ''}`,
                start: apt.appointment_date + 'T' + apt.appointment_time,
                backgroundColor: apt.status === 'scheduled' ? '#ffc107' : apt.status === 'confirmed' ? '#0dcaf0' : apt.status === 'completed' ? '#198754' : '#6c757d',
                borderColor: 'transparent',
                textColor: '#000',
                extendedProps: {
                    patient: `${apt.p_first} ${apt.p_last}`,
                    doctor: apt.d_first ? `Dr. ${apt.d_first} ${apt.d_last}` : 'Unassigned',
                    status: apt.status,
                    phone: apt.p_phone
                }
            })));
        },
        eventClick: function(info) {
            const e = info.event;
            alert(`Patient: ${e.extendedProps.patient}\nDoctor: ${e.extendedProps.doctor}\nStatus: ${e.extendedProps.status}\nPhone: ${e.extendedProps.phone || 'N/A'}`);
        }
    });
    calendar.render();
});
</script>
{% endblock %}
