{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-wallet2"></i> Billing</h4>
    <div>
        <button class="btn btn-outline-primary me-2" onclick="$('#paymentModal').modal('show')"><i class="bi bi-cash me-1"></i>Record Payment</button>
        <a href="/billing/new" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>New Invoice</a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div class="row mb-3">
            <div class="col-md-3">
                <select class="form-select form-select-sm" id="status-filter">
                    <option value="">All Status</option>
                    <option value="pending">Pending</option>
                    <option value="partial">Partial</option>
                    <option value="paid">Paid</option>
                </select>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table" id="billing-table">
                <thead>
                    <tr>
                        <th>Invoice</th>
                        <th>Date</th>
                        <th>Patient</th>
                        <th>Total</th>
                        <th>Paid</th>
                        <th>Balance</th>
                        <th>Method</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Record Payment</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Invoice</label>
                    <select class="form-select" id="payment-invoice"><option value="">Select invoice...</option></select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Amount (MK)</label>
                    <input type="number" class="form-control" id="payment-amount" step="0.01" min="0">
                </div>
                <div class="mb-3">
                    <label class="form-label">Payment Method</label>
                    <select class="form-select" id="payment-method">
                        <option value="cash">Cash</option>
                        <option value="card">Card</option>
                        <option value="mobile_money">Mobile Money (M-Pesa)</option>
                        <option value="insurance">Insurance</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Insurance Claim ID</label>
                    <input type="text" class="form-control" id="payment-claim-id" placeholder="If using MASM eClaim">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="recordPayment()">Record Payment</button>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    let table = $('#billing-table').DataTable({
        ajax: function(data, callback, settings) { fetchWithAuth('/billing/api?' + $.param(data)).then(r => { if (r.status === 401) throw new Error('Unauthorized'); return r.json(); }).then(d => callback({data:d})).catch(() => callback({data:[]})); },
        columns: [
            { data: 'invoice_number', render: d => '<span class="fw-semibold" style="color:#0f172a">' + d + '</span>' },
            { data: 'created_at', render: d => new Date(d).toLocaleDateString() },
            { data: null, render: d => '<a href="/patients/' + d.patient_id + '" class="text-decoration-none fw-semibold" style="color:#0f172a">' + d.p_first + ' ' + d.p_last + '</a>' },
            { data: null, render: d => '<span class="fw-semibold">MK ' + (d.total_amount || 0).toLocaleString() + '</span>' },
            { data: null, render: d => 'MK ' + (d.amount_paid || 0).toLocaleString() },
            { data: null, render: d => '<span class="' + (d.balance > 0 ? 'text-danger fw-semibold' : '') + '">MK ' + (d.balance || 0).toLocaleString() + '</span>' },
            { data: 'payment_method', render: d => (d || '-').replace('_', ' ') },
            { data: null, render: d => '<span class="badge bg-' + (d.payment_status === 'paid' ? 'success' : d.payment_status === 'partial' ? 'warning' : 'danger') + '">' + d.payment_status + '</span>' },
            { data: null, render: d => '<a href="/billing/' + d.id + '" class="btn-action view" title="View"><i class="bi bi-eye"></i></a><a href="/billing/' + d.id + '/print" class="btn-action print" target="_blank" title="Print"><i class="bi bi-printer"></i></a>' }
        ],
        order: [[1, 'desc']],
        pageLength: 20
    });

    $('#status-filter').on('change', function() { table.ajax.url('/billing/api?status=' + this.value).load(); });

    fetchWithAuth('/billing/api').then(r => r.json()).then(data => {
        const sel = document.getElementById('payment-invoice');
        data.filter(b => b.payment_status !== 'paid').forEach(b => {
            sel.innerHTML += '<option value="' + b.id + '">' + b.invoice_number + ' - ' + b.p_first + ' ' + b.p_last + ' (Bal: MK ' + b.balance + ')</option>';
        });
    });
});

async function recordPayment() {
    const id = document.getElementById('payment-invoice').value;
    const amount = parseFloat(document.getElementById('payment-amount').value);
    const method = document.getElementById('payment-method').value;
    const claim = document.getElementById('payment-claim-id').value;
    if (!id || !amount) { alert('Select invoice and enter amount'); return; }
    const res = await fetchWithAuth('/billing/api/' + id + '/payment', { method: 'PATCH', body: JSON.stringify({amount, payment_method: method, insurance_claim_id: claim || null}) });
    if (res.ok) { bootstrap.Modal.getInstance(document.getElementById('paymentModal')).hide(); $('#billing-table').DataTable().ajax.reload(); }
    else alert('Error recording payment');
}
</script>
{% endblock %}
