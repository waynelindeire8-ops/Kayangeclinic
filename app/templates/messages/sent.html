{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-send"></i> Sent Messages</h4>
    <a href="/messages/compose" class="btn btn-primary"><i class="bi bi-pencil-square me-1"></i>Compose</a>
</div>

<div class="card">
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table" id="sent-table">
                <thead>
                    <tr>
                        <th>To</th>
                        <th>Subject</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th style="width:80px">Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="sent-empty" class="text-center text-muted py-5" style="display:none">
            <i class="bi bi-send" style="font-size:2rem;display:block;margin-bottom:0.5rem"></i>
            No sent messages
        </div>
    </div>
</div>

<div class="modal fade" id="msgModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="msg-subject"></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div>
                        <small class="text-muted">To:</small>
                        <strong id="msg-to"></strong>
                        <span id="msg-role" class="badge bg-secondary ms-1"></span>
                    </div>
                    <small class="text-muted" id="msg-date"></small>
                </div>
                <hr>
                <div id="msg-body" class="py-2" style="white-space:pre-wrap"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline-danger btn-sm" onclick="deleteMsg()"><i class="bi bi-trash me-1"></i>Delete</button>
                <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<script>
let currentMsgId = null;

document.addEventListener('DOMContentLoaded', async function() {
    const res = await fetchWithAuth('/messages/api/sent');
    const msgs = await res.json();
    const tbody = document.querySelector('#sent-table tbody');
    const empty = document.getElementById('sent-empty');
    if (msgs.length) {
        empty.style.display = 'none';
        msgs.forEach(m => {
            const status = m.is_read ? '<span class="badge bg-success">Read</span>' : '<span class="badge bg-warning">Unread</span>';
            tbody.innerHTML += '<tr style="cursor:pointer" onclick="openMsg(' + m.id + ')">' +
                '<td>' + (m.r_first || '') + ' ' + (m.r_last || '') + '</td>' +
                '<td>' + escHtml(m.subject) + '</td>' +
                '<td>' + new Date(m.sent_at).toLocaleString() + '</td>' +
                '<td>' + status + '</td>' +
                '<td><button class="btn-action delete" onclick="event.stopPropagation();deleteMsg(' + m.id + ')"><i class="bi bi-trash"></i></button></td></tr>';
        });
    } else {
        document.getElementById('sent-table').style.display = 'none';
        empty.style.display = 'block';
    }
});

async function openMsg(id) {
    const res = await fetchWithAuth('/messages/api/' + id);
    const m = await res.json();
    currentMsgId = m.id;
    document.getElementById('msg-subject').textContent = m.subject;
    document.getElementById('msg-to').textContent = (m.r_first || '') + ' ' + (m.r_last || '');
    document.getElementById('msg-role').textContent = (m.r_role || '').replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
    document.getElementById('msg-date').textContent = new Date(m.sent_at).toLocaleString();
    document.getElementById('msg-body').textContent = m.body;
    new bootstrap.Modal(document.getElementById('msgModal')).show();
}

async function deleteMsg(id) {
    const msgId = id || currentMsgId;
    if (!msgId) return;
    if (!confirm('Delete this message?')) return;
    await fetchWithAuth('/messages/api/' + msgId + '/delete', { method: 'PUT' });
    if (document.getElementById('msgModal').classList.contains('show')) {
        bootstrap.Modal.getInstance(document.getElementById('msgModal')).hide();
    }
    location.reload();
}

function escHtml(str) {
    if (!str) return '';
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}
</script>
{% endblock %}
