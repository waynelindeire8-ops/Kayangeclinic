{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-people"></i> Patients</h4>
    <div>
        <a href="/patients/import" class="btn btn-outline-success me-2"><i class="bi bi-file-earmark-spreadsheet me-1"></i>Import</a>
        <a href="/patients/new" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>New Patient</a>
    </div>
</div>

<div class="card">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table" id="patients-table">
                <thead>
                    <tr>
                        <th>Patient ID</th>
                        <th>Name</th>
                        <th>Gender</th>
                        <th>DOB</th>
                        <th>Phone</th>
                        <th>Scheme</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const INSURANCE_PROVIDERS = {{ providers_json | safe }};

document.addEventListener('DOMContentLoaded', function() {
    const avatarColors = ['#16a34a','#2563eb','#f59e0b','#dc2626','#9333ea','#0ea5e9','#ec4899','#14b8a6'];
    let colorIdx = 0;

    let table = $('#patients-table').DataTable({
        ajax: { url: '/patients/api', dataSrc: '' },
        columns: [
            { data: 'patient_id', render: d => '<span class="fw-semibold" style="color:#0f172a">#' + d + '</span>' },
            { data: null, render: function(d) {
                const initials = (d.first_name || 'P').charAt(0) + (d.last_name || '').charAt(0);
                const color = avatarColors[colorIdx++ % avatarColors.length];
                return '<div class="patient-cell"><div class="patient-avatar" style="background:' + color + '">' + initials + '</div><div><div class="fw-semibold" style="color:#0f172a"><a href="/patients/' + d.id + '" class="text-decoration-none" style="color:inherit">' + d.first_name + ' ' + d.last_name + '</a></div><small class="text-muted">' + (d.email || '') + '</small></div></div>';
            }},
            { data: 'gender', render: d => d || '-' },
            { data: 'dob', render: d => d || '-' },
            { data: 'phone', render: d => d || '-' },
            { data: null, render: d => {
                if (d.scheme_id && INSURANCE_PROVIDERS[d.scheme_id]) {
                    return '<span class="badge bg-success">' + INSURANCE_PROVIDERS[d.scheme_id] + '</span>' + (d.scheme_number ? '<br><small class="text-muted">' + d.scheme_number + '</small>' : '');
                }
                return '<span class="badge bg-secondary">Self-Pay</span>';
            }},
            { data: null, render: d => '<div class="d-flex gap-1"><a href="/patients/' + d.id + '" class="btn-action view" title="View"><i class="bi bi-eye"></i></a><a href="/patients/' + d.id + '/edit" class="btn-action edit" title="Edit"><i class="bi bi-pencil"></i></a><button class="btn-action delete" title="Delete" onclick="deletePatient(' + d.id + ')"><i class="bi bi-trash"></i></button></div>' }
        ],
        order: [[0, 'desc']],
        pageLength: 15,
        language: { search: '', searchPlaceholder: 'Search...' }
    });
});

async function deletePatient(id) {
    if (!confirm('Delete this patient and all related records?')) return;
    const res = await fetchWithAuth('/patients/api/' + id, { method: 'DELETE' });
    if (res.ok) {
        $('#patients-table').DataTable().ajax.reload();
    } else {
        const err = await res.json();
        alert(err.error || 'Error deleting patient');
    }
}
</script>
{% endblock %}
